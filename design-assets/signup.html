<style>
        body {
            background-color: #F9FAFB;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-focus-effect:focus {
            box-shadow: 0 0 0 2px rgba(53, 37, 205, 0.1);
        }
    </style>

<body class="bg-surface">
<div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">

</div>
<main class="w-full max-w-[480px] px-margin-mobile md:px-0 py-section-gap">
<div class="flex flex-col items-center mb-8">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">description</span>
<h1 class="font-display text-headline-lg text-on-surface">ProForms</h1>
</div>
<p class="font-body-md text-secondary">The systematic way to build forms.</p>
</div>
<div class="bg-surface-container-lowest rounded-xl shadow-sm p-8 md:p-10 border border-outline-variant/30">
<h2 class="font-display text-headline-md text-on-surface mb-8">Create your account</h2>
<form action="#" class="space-y-5" method="POST">
<div>
<label class="block font-label-md text-on-surface-variant mb-1.5 ml-0.5" for="full_name">Full Name</label>
<input class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface-bright text-on-surface font-body-md focus:outline-none focus:border-primary input-focus-effect transition-all placeholder:text-outline" id="full_name" name="full_name" placeholder="John Doe" required="" type="text"/>
</div>
<div>
<label class="block font-label-md text-on-surface-variant mb-1.5 ml-0.5" for="email">Email address</label>
<input class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface-bright text-on-surface font-body-md focus:outline-none focus:border-primary input-focus-effect transition-all placeholder:text-outline" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
<div class="relative">
<label class="block font-label-md text-on-surface-variant mb-1.5 ml-0.5" for="password">Password</label>
<input class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface-bright text-on-surface font-body-md focus:outline-none focus:border-primary input-focus-effect transition-all placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-[38px] text-outline-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-md">visibility</span>
</button>
</div>
<div class="flex items-start gap-3 pt-1">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20 transition-all cursor-pointer" id="terms" name="terms" required="" type="checkbox"/>
</div>
<label class="font-label-md text-on-surface-variant leading-tight" for="terms">
                        I agree to the <a class="text-primary hover:underline font-semibold" href="#">Terms of Service</a> and <a class="text-primary hover:underline font-semibold" href="#">Privacy Policy</a>.
                    </label>
</div>
<button class="w-full bg-primary text-on-primary py-3.5 rounded-lg font-label-md hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4 shadow-sm" type="submit">
                    Get Started
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/40"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-surface-container-lowest px-2 text-outline-variant font-label-sm">Or continue with</span>
</div>
</div>
<button class="w-full bg-white border border-outline-variant text-on-surface py-3 rounded-lg font-label-md hover:bg-surface-container-low transition-colors flex items-center justify-center gap-3" type="button">
<svg height="20" viewbox="0 0 24 24" width="20">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Sign up with Google
            </button>
</div>
<p class="text-center mt-8 font-label-md text-on-surface-variant">
            Already have an account? 
            <a class="text-primary font-bold hover:underline ml-1" href="#">Sign in</a>
</p>
</main>
<footer class="fixed bottom-0 w-full py-8 pointer-events-none opacity-40">
<div class="max-w-container-max mx-auto px-margin-desktop flex justify-center">
<p class="font-label-sm text-on-surface-variant">© 2024 ProForms Inc. Built for high-performance teams.</p>
</div>
</footer>
<script>
        // Simple micro-interaction for password visibility toggle
        const toggleBtn = document.querySelector('.absolute.right-3.top-\\[38px\\]');
        const passwordInput = document.getElementById('password');
        
        if (toggleBtn && passwordInput) {
            toggleBtn.addEventListener('click', () => {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                toggleBtn.querySelector('span').textContent = isPassword ? 'visibility_off' : 'visibility';
            });
        }

        // Add visual feedback to form validation
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('invalid', (e) => {
                e.preventDefault();
                input.classList.add('border-error');
                input.classList.remove('border-outline-variant');
            });
            input.addEventListener('input', () => {
                if (input.validity.valid) {
                    input.classList.remove('border-error');
                    input.classList.add('border-outline-variant');
                }
            });
        });
    </script>
</body></html>
